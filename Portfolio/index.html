<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Project</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="intro-active">
  <header class="site-header">
    <nav class="top-nav">
      <span class="top-nav__spacer" aria-hidden="true"></span>
      <img class="site-title" src="png.png" alt="Cole Louie" />
      <button type="button" class="nav-button" data-href="HtmlPages/about.html">About Page</button>
    </nav>
    <div class="header-divider" aria-hidden="true"></div>
  </header>

  <section class="intro-overlay" aria-label="Portfolio intro animation">
    <img
      class="intro-logo"
      src="png.png"
      alt="Cole Louie"
    />
    <p class="intro-subtitle">A Graphic Design Portfolio</p>
  </section>

  <main class="portfolio-layout">
    <section id="projects" class="project-row">
      <button type="button" class="project-tile" data-href="HtmlPages/motion-graphic-design.html" aria-label="Open Motion Graphic Design project" data-title="Motion Graphic Design">
        <div class="tile-image tile-image-top"></div>
      </button>
      <button type="button" class="project-tile" data-href="HtmlPages/jsa-poster-designs.html" aria-label="Open Japanese Student Association poster designs" data-title="Japanese Student Association Poster Designs">
        <div class="tile-image tile-image-1"></div>
      </button>
      <button type="button" class="project-tile" data-href="HtmlPages/interactive-designs.html" aria-label="Open Interactive Designs project" data-title="Interactive Designs">
        <div class="tile-image tile-image-2"></div>
      </button>
      <button type="button" class="project-tile" data-href="HtmlPages/misc-poster-designs.html" aria-label="Open Misc. Poster Designs project" data-title="Misc. Poster Designs">
        <div class="tile-image tile-image-3"></div>
      </button>
      <button type="button" class="project-tile" data-href="HtmlPages/ai-artworks.html" aria-label="Open A.I Artworks project" data-title="A.I Artworks">
        <div class="tile-image tile-image-4"></div>
      </button>
      <button type="button" class="project-tile" data-href="HtmlPages/vector-portraits.html" aria-label="Open Vector Portraits project" data-title="Vector Portraits">
        <div class="tile-image tile-image-5"></div>
      </button>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
