<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Project</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="intro-active">
  <header class="site-header">
    <nav class="top-nav">
      <button type="button" class="nav-button" data-href="contact.html">Contacts</button>
      <img class="site-title" src="png.png" alt="Cole Louie" />
      <button type="button" class="nav-button" data-href="about.html">About Page</button>
    </nav>
    <div class="header-divider" aria-hidden="true"></div>
  </header>

  <section class="intro-overlay" aria-label="Portfolio intro animation">
    <img
      class="intro-logo"
      src="png.png"
      alt="Cole Louie"
    />
    <p class="intro-subtitle">A Graphic Design Portfolio</p>
  </section>

  <main class="portfolio-layout">
    <section id="projects" class="project-row">
      <a class="project-tile" href="#" aria-label="Open News Gothic typography study (Project 3)" data-title="Motion Graphic Design">
        <div class="tile-image tile-image-top"></div>
      </a>
      <a class="project-tile" href="#" aria-label="Open vector sunset illustration project" data-title="Japanese Student Association Poster Designs
    ">
        <div class="tile-image tile-image-1"></div>
      </a>
      <a class="project-tile" href="#" aria-label="Open Jung Hoo Lee poster project" data-title="Interactive Designs">
        <div class="tile-image tile-image-2"></div>
      </a>
      <a class="project-tile" href="#" aria-label="Open portfolio section (middle right, lower)" data-title="Misc. Poster Designs">
        <div class="tile-image tile-image-3"></div>
      </a>
      <a class="project-tile" href="#" aria-label="Open portfolio section (bottom left)" data-title="A.I Artworks">
        <div class="tile-image tile-image-4"></div>
      </a>
      <a class="project-tile" href="#" aria-label="Open portfolio section (bottom right)" data-title="Vector Portraits">
        <div class="tile-image tile-image-5"></div>
      </a>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
