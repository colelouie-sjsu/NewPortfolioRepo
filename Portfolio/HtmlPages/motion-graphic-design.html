<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motion Graphic Design — Cole Louie</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body class="page-motion-mg">
  <header class="site-header">
    <nav class="top-nav top-nav--return-only" aria-label="Primary">
      <button type="button" class="motion-mg-return motion-mg-return--header" data-href="../index.html">Return</button>
      <img class="site-title" src="../png.png" alt="Cole Louie" />
      <span class="top-nav__spacer" aria-hidden="true"></span>
    </nav>
    <div class="header-divider" aria-hidden="true"></div>
  </header>

  <main class="portfolio-layout project-detail motion-mg-page">
    <div class="motion-mg-list">
      <div class="motion-mg-list__inner">
        <button
          type="button"
          class="motion-mg-card"
          data-video-src="https://youtu.be/THml8G5-gL4"
          data-title="News Gothic Typography"
          data-body="This project was the first time I had ever used After Effects. Coming off of Premiere Pro, the application came with some ease but learning the specific effects such as the spinning newspaper and the appearance of graphics to show details of the type were challenging but workable. Surprisingly as my first ever use project, this is still one of the best looking motion designs I have created."
        >
          <span class="motion-mg-card__title">News Gothic Typography</span>
          <span class="motion-mg-card__lead">A brief study in the typographic history of News Gothic and Morris Fuller Benton.</span>
        </button>
        <button
          type="button"
          class="motion-mg-card"
          data-video-src="https://youtu.be/Je_hv0HiZmg"
          data-title="Warhammer40k — Motivational speech"
          data-body="This project, I wanted to experiment with 3D elements of after effects and utilizing characters with a specific narrative. I wanted to match the fast paced and strong worded speech with strong imagery and propagandic feel."
        >
          <span class="motion-mg-card__title">Warhammer40k — Motivational speech</span>
          <span class="motion-mg-card__lead">A short 1:05 minute speech given in the game of Space Marines II from the Cadian Commander.</span>
        </button>
        <button
          type="button"
          class="motion-mg-card"
          data-video-src="../Works/Motion%20Graphics/Text%20Motion%20Graphic.mp4"
          data-title="Text Motion Graphic"
          data-body="This small text project was created shortly after the typographic project in order for me to learn how to use animations with text. In this short demo, I wanted to show some basic skills in learning how to utilize the creative applications both imported from premiere pro and youtube."
        >
          <span class="motion-mg-card__title">Text Motion Graphic</span>
          <span class="motion-mg-card__lead">My personal learning project with text and motion graphics.</span>
        </button>
        <button
          type="button"
          class="motion-mg-card"
          data-video-src="../Works/Motion%20Graphics/Graphic%20Logo%20pt2.mp4"
          data-title="Graphic Logo Animation Plugin"
          data-body="This extremely small video is just a small demo using a plugin from the downloaded animation panel. This comes to show that this will expedite my motion graphic process and creations for future projects."
        >
          <span class="motion-mg-card__title">Graphic Logo Animation Plugin</span>
          <span class="motion-mg-card__lead">Using the Hanshin Tiger's logo to create a small motion graphic using plugins..</span>
        </button>
      </div>
    </div>
  </main>

  <div
    class="motion-mg-expand"
    id="motion-expand"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="motion-expand-title"
  >
    <div class="motion-mg-expand__backdrop" data-motion-close></div>
    <div class="motion-mg-expand__panel">
      <button type="button" class="motion-mg-expand__close" data-motion-close aria-label="Close">×</button>
      <h2 id="motion-expand-title" class="motion-mg-expand__title"></h2>
      <div class="motion-mg-expand__grid">
        <div class="motion-mg-expand__media">
          <video class="motion-mg-expand__video" controls playsinline preload="metadata">
            <source src="" type="video/mp4" />
          </video>
          <iframe
            class="motion-mg-expand__youtube-player"
            src=""
            title="YouTube video player"
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
            hidden
          ></iframe>
        </div>
        <div class="motion-mg-expand__body" id="motion-expand-body"></div>
      </div>
    </div>
  </div>

  <script src="../script.js"></script>
</body>
</html>
