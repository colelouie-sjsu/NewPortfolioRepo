<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japanese Student Association Poster Designs � Cole Louie</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body class="page-motion-mg page-jsa-posters">
  <header class="site-header">
    <nav class="top-nav top-nav--return-only" aria-label="Primary">
      <button type="button" class="motion-mg-return motion-mg-return--header" data-href="../index.html">Return</button>
      <img class="site-title" src="../png.png" alt="Cole Louie" />
      <span class="top-nav__spacer" aria-hidden="true"></span>
    </nav>
    <div class="header-divider" aria-hidden="true"></div>
  </header>

  <main class="portfolio-layout project-detail motion-mg-page">
    <div class="motion-mg-list">
      <div class="motion-mg-list__inner">
        <button type="button" class="motion-mg-card" style="--card-thumb: url('../Works/JSA/Open%20House%20Post_Final%20png.png');" data-media-type="image" data-media-src="../Works/JSA/Open%20House%20Post_Final%20png.png" data-title="Open House Post" data-body="This poster was my first task when I joined the Graphic Design team for JSA. I created this simple realistic spring poster for the club before developing and learning my personal style. For this post, I aimed for minimalism but I wanted to create an interesting composition and the inclusing of a spring themed photo. To achieve my goal, I created text and shape interactions with a cherry blossom tree to add depth and had all of the characters leaning toward an upward direction. ">
          <span class="motion-mg-card__title">Open House Post</span>
          <span class="motion-mg-card__lead">The first poster and social event of the semester!</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/Curryoke_F.jpg" data-title="Curryoke Poster" data-body="This was my second poster created for JSA and has been one of my personal favorites. Funny enough this was a last minute poster as the Marketing Head notified me that the event had changed from karaoke night to 'curry-oke' night to where I had a day to make changes to the previous design to this one you see here. This poster was created using vectors from illustrator which I figured would be my style of social media posts.">
          <span class="motion-mg-card__title">Curryoke Poster</span>
          <span class="motion-mg-card__lead">A fun vector poster created for JSA's popular event, Curry-oke!</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/2016%20poster_F.png" data-title="2016 Poster" data-body="The 2016 throwback poster marked the last public event that non-members of JSA can attend. Again, this poster had to be made fairly quickly as I was tasked last minute but what came out was a simple yet perfectly themed ensemble of icons,memorabilia, and generational trends from the 2016 era.">
          <span class="motion-mg-card__title">2016 Poster</span>
          <span class="motion-mg-card__lead">Simple Poster Created for JSA's last public event</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/Fam%20Forum_F.png" data-title="Fam Forum Poster" data-body="For this poster, I stepped away from the vector creations as this was meant to be more information than being an online spectacle. The composition of the piece is relatively unique as I wanted the important text to be clumped together which is why at the top it is a rectangle with the graphics being on the bottom. Graphic wise it was at its most simplest with having cut out megaphones and the logos of the fams. Now I also wanted to keep the club colors consistent through my artworks so at this point I experimented with how far I can take the red and white design.">
          <span class="motion-mg-card__title">Fam Forum Poster</span>
          <span class="motion-mg-card__lead">A basic informational poster created for JSA's Fam Forum event to recruit new members!</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/Meet%20the%20Fams%20Poster_F.png" data-title="Meet the Fams Poster" data-body="For the meet the fams, I wanted to be more creative with how I make informational posters instead of having just pure text in a simple composition. Being heavily inspired by the videogame, Team Fortress 2, I thought it would be a pleasing idea to base this poster off of the game’s “Meet the Team” style. This called for the research of fonts, the mimicking of title cards, and a lot of personal input with each of the fams occupying a square.">
          <span class="motion-mg-card__title">Meet the Fams Poster</span>
          <span class="motion-mg-card__lead">An intermediate poster created for interested memebers to introduce them to their next possible fam!.</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/Fam%20Reveal_F.png" data-title="Fam Reveal Poster" data-body="For the fam reveal poster, it was another last minute request but I took it as a way to experiment with a different theming approach. I liked the look of retro 70s and 80s graphic design patterns which I wanted to put into this creation. Now considering that this was a poster needing to be created in almost less than a day, there was not as much intricate patterning but there was a lot of fun with creating the illusions and composition.">
          <span class="motion-mg-card__title">Fam Reveal Poster</span>
          <span class="motion-mg-card__lead">The follow up for the Fam Forum poster! In this event, the fams, ryu, kitsune, tsuru, and koi revealed the members they chose to koin their respecitve fams!!</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/sports%20day%20poster_F.jpg" data-title="Sports Day Poster" data-body="This poster was the first JSA collaboration with another fellow Japanese culture club with another college. In this case, Santa Clara University! For this, I wanted to keep it simple but match the excitement and energy that this event was supposed to represent. Of course, I went back to vector art for the graphics for a clean and official look.">
          <span class="motion-mg-card__title">Sports Day Poster</span>
          <span class="motion-mg-card__lead">The first poster created for JSA advertising their collab with Santa Clara University's Japanese Student Association!</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/Boba%20Poster_F.png" data-title="Boba Poster" data-body="The boba tea fundraiser was a poster that was being slowly built up. I was given the task of creating a poster weeks before the date as JSA wanted me to create an early poster. For this I really got to test my vector abilities using a large array of colors, objects, and new types of fonts.What came out was a fun and bubbly poster that took lots of work and changes but overall matched the boba shop’s theme as well as being as creative and unique as possible.">
          <span class="motion-mg-card__title">Boba Poster</span>
          <span class="motion-mg-card__lead">Poster created for the first JSA Boba Tea Fundraiser of the semester!</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/BeachDayPoster_F.png" data-title="Beach Day Poster" data-body="This beach post was another test for my vector abilities. I was inspired by old travel cards and travel posters which is where I got the sun and cloud ideas from. It took a lot of time to come up with the details of the ocean and to nail the sunset on the head. I also kept in mind that this poster was probably being reused by San Francisco State University’s Japanese Student Association. Glady, They liked it and wanted to use it on their account!">
          <span class="motion-mg-card__title">Beach Day Poster</span>
          <span class="motion-mg-card__lead">A vector poster created for a retro feel for the SJSU x SFSU Beach Day event</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/New%20Exec%20Poster2.png" data-title="New Exec Poster" data-body="This latest poster, I went back and forth on as the original design was more typographic but wasn’t needed. In this situation, I created another simple and more professional poster design using vector people to represent the executive side of the JSA. Just plain, simple, professional.">
          <span class="motion-mg-card__title">New Exec Poster</span>
          <span class="motion-mg-card__lead">Focusing on professional design, this poster is about interesting other members to possible leadership roles within JSA!.</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/Shirt%20Vector2.png" data-secondary-src="../Works/JSA/cart.png" data-popup-variant="merch-stack" data-title="JSA Merchandise Creation" data-body="The shirt design was given to me and another experienced graphic designer. We were given 2 weeks to come up with 1 design each for JSA’s batch of shirts being issued. Now I wanted to focus on the design that highlighted the culture aspect of Japan, hence the various Japanese Artworks, the vectors of the food, and the addition of the fams within the club. Eventually when it came down to a vote, the members and the executive board had a 50/50 split causing me and my fellow designer, Tina Nguyen, to collaborate to create a graphic as seen on the bottom which is now the officially submitted design for JSA.">
          <span class="motion-mg-card__title">JSA Merchandise Creation</span>
          <span class="motion-mg-card__lead">In collaboration with another Graphic Designer in the club, we created the graphic shirt design for the club!</span>
        </button>
      </div>
    </div>
  </main>

  <div class="motion-mg-expand motion-mg-expand--poster" id="motion-expand" hidden role="dialog" aria-modal="true" aria-labelledby="motion-expand-title">
    <div class="motion-mg-expand__backdrop" data-motion-close></div>
    <div class="motion-mg-expand__panel">
      <button type="button" class="motion-mg-expand__close" data-motion-close aria-label="Close">�</button>
      <h2 id="motion-expand-title" class="motion-mg-expand__title"></h2>
      <div class="motion-mg-expand__grid">
        <div class="motion-mg-expand__media">
          <video class="motion-mg-expand__video" controls playsinline preload="metadata" hidden>
            <source src="" type="video/mp4" />
          </video>
          <img class="motion-mg-expand__image" src="" alt="" hidden />
          <img class="motion-mg-expand__image-secondary" src="" alt="" hidden />
        </div>
        <div class="motion-mg-expand__body" id="motion-expand-body"></div>
      </div>
    </div>
  </div>
  <div class="misc-image-viewer" id="jsa-image-viewer" hidden>
    <div class="misc-image-viewer__backdrop" data-jsa-image-close></div>
    <div class="misc-image-viewer__content">
      <img id="jsa-image-viewer-img" src="" alt="" />
    </div>
  </div>

  <script src="../script.js"></script>
</body>
</html>
