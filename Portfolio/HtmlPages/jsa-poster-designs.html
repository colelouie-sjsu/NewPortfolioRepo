<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japanese Student Association Poster Designs � Cole Louie</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body class="page-motion-mg">
  <header class="site-header">
    <nav class="top-nav top-nav--return-only" aria-label="Primary">
      <button type="button" class="motion-mg-return motion-mg-return--header" data-href="../index.html">Return</button>
      <img class="site-title" src="../png.png" alt="Cole Louie" />
      <span class="top-nav__spacer" aria-hidden="true"></span>
    </nav>
    <div class="header-divider" aria-hidden="true"></div>
  </header>

  <main class="portfolio-layout project-detail motion-mg-page">
    <div class="motion-mg-list">
      <div class="motion-mg-list__inner">
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/Open%20House%20Post_Final%20png.png" data-title="Open House Post" data-body="Open house promo optimized for social sharing and quick message delivery. Type hierarchy and spacing keep venue/time details legible even on small screens.">
          <span class="motion-mg-card__title">Open House Post</span>
          <span class="motion-mg-card__lead">The first poster and social event of the semester!</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/Curryoke_F.jpg" data-title="Curryoke Poster" data-body="Hybrid concept poster blending food and music branding cues. The composition uses bold headline placement with secondary text blocks to guide scanning order.">
          <span class="motion-mg-card__title">Curryoke Poster</span>
          <span class="motion-mg-card__lead">A fun vector poster created for JSA's popular event, Curry-oke!</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/2016%20poster_F.png" data-title="2016 Poster" data-body="A flagship promotional layout balancing strong hierarchy, event details, and visual rhythm. The typography and spacing are tuned for quick readability across print and social crops.">
          <span class="motion-mg-card__title">2016 Poster</span>
          <span class="motion-mg-card__lead">Simple Poster Created for JSA's last public event</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/Fam%20Forum_F.png" data-title="Fam Forum Poster" data-body="Informational event poster that prioritizes clarity for date/time/location details. Type scale and spacing are set to keep key details visible from distance.">
          <span class="motion-mg-card__title">Fam Forum Poster</span>
          <span class="motion-mg-card__lead">A basic informational poster created for JSA's Fam Forum event to recruit new members!</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/Meet%20the%20Fams%20Poster_F.png" data-title="Meet the Fams Poster" data-body="Community identity piece designed to introduce groups in a friendly, organized format. The composition balances personality with structure to support both print and feed usage.">
          <span class="motion-mg-card__title">Meet the Fams Poster</span>
          <span class="motion-mg-card__lead">An intermediate poster created for interested memebers to introduce them to their next possible fam!.</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/Fam%20Reveal_F.png" data-title="Fam Reveal Poster" data-body="Reveal-style event visual designed to build curiosity with controlled pacing in the layout. Priority is given to headline emphasis followed by reveal details and CTA.">
          <span class="motion-mg-card__title">Fam Reveal Poster</span>
          <span class="motion-mg-card__lead">The follow up for the Fam Forum poster with the Reveal to whose who joined!</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/sports%20day%20poster_F.jpg" data-title="Sports Day Poster" data-body="High-energy sports event poster with headline emphasis and directional layout flow. Designed to communicate urgency while preserving clean readability for core event details.">
          <span class="motion-mg-card__title">Sports Day Poster</span>
          <span class="motion-mg-card__lead">The first poster created for JSA advertising their collab with Santa Clara University's Japanese Student Association!</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/Boba%20Poster_F.png" data-title="Boba Poster" data-body="Food-and-community themed campaign visual with a simple focal point and supporting info blocks. The design emphasizes friendly tone while preserving structure and legibility.">
          <span class="motion-mg-card__title">Boba Poster</span>
          <span class="motion-mg-card__lead">Poster created for the first JSA Boba Tea Fundraiser of the semester!</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/BeachDayPoster_F.png" data-title="Beach Day Poster" data-body="Seasonal event artwork focused on high-contrast title treatment and playful composition. Built to feel energetic while keeping call-to-action details clear at a glance.">
          <span class="motion-mg-card__title">Beach Day Poster</span>
          <span class="motion-mg-card__lead">A vector poster created for a retro feel for the SJSU x SFSU Beach Day event</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/New%20Exec%20Poster2.png" data-title="New Exec Poster" data-body="Roster-driven poster highlighting new executive members with strong visual grouping. Built to maintain readability while fitting multiple names and roles in one frame.">
          <span class="motion-mg-card__title">New Exec Poster</span>
          <span class="motion-mg-card__lead">Focusing on professional design, this poster is about interesting other members to possible leadership roles within JSA!.</span>
        </button>
        <button type="button" class="motion-mg-card" data-media-type="image" data-media-src="../Works/JSA/Shirt%20Vector2.png" data-secondary-src="../Works/JSA/cart.png" data-popup-variant="merch-stack" data-title="JSA Merchandise Creation" data-body="Merch-focused visual development spanning apparel and supporting product graphics. Created to keep branding consistent across wearable designs and event merchandise touchpoints.">
          <span class="motion-mg-card__title">JSA Merchandise Creation</span>
          <span class="motion-mg-card__lead">In collaboration with another Graphic Designer in the club, we created the graphic shirt design for the club!</span>
        </button>
      </div>
    </div>
  </main>

  <div class="motion-mg-expand motion-mg-expand--poster" id="motion-expand" hidden role="dialog" aria-modal="true" aria-labelledby="motion-expand-title">
    <div class="motion-mg-expand__backdrop" data-motion-close></div>
    <div class="motion-mg-expand__panel">
      <button type="button" class="motion-mg-expand__close" data-motion-close aria-label="Close">�</button>
      <h2 id="motion-expand-title" class="motion-mg-expand__title"></h2>
      <div class="motion-mg-expand__grid">
        <div class="motion-mg-expand__media">
          <video class="motion-mg-expand__video" controls playsinline preload="metadata" hidden>
            <source src="" type="video/mp4" />
          </video>
          <img class="motion-mg-expand__image" src="" alt="" hidden />
          <img class="motion-mg-expand__image-secondary" src="" alt="" hidden />
        </div>
        <div class="motion-mg-expand__body" id="motion-expand-body"></div>
      </div>
    </div>
  </div>

  <script src="../script.js"></script>
</body>
</html>
