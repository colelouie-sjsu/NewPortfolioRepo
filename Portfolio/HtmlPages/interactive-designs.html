  <main class="portfolio-layout project-detail motion-mg-page">
    <div class="motion-mg-list">
      <div class="motion-mg-list__inner">
        <button
          type="button"
          class="motion-mg-card"
          data-media-type="image"
          data-media-src="../Works/Interactive/Screenshot%202026-04-14%20123821.png"
          data-secondary-src="../Works/Interactive/Screenshot%202025-10-07%20124641.png"
          data-secondary-link="https://indd.adobe.com/view/5b31bd1b-53a6-4a84-bfb5-33b185cff3cb"
          data-popup-cta="Click The Lower Image To View!"
          data-popup-variant="interactive-diagonal"
          data-title="Indesign portfolio"
          data-body="This was my first created official portfolio that had the most basic interactivity that Adobe InDesign had to offer. This portfolio was updated time and time again till I felt that I need to grow beyond this application. The portfolio opened the same as this page with an Invincible like opening as I was inspired by it's opening sequence. Each of the pages that I have made were identical to this portfolio's design but less organized as the Indesign workspace and tools were more tedious and time consuming to work with. Still, it had amazing animations and display of my early professional works. As you can tell, this custom website/portfolio is based on my first portfolio which I am still proud of making to this day! "
        >
          <span class="motion-mg-card__title">Indesign portfolio</span>
          <span class="motion-mg-card__lead">My first created portfolio mixing my arts and early interactivity!</span>
        </button>
        <button
          type="button"
          class="motion-mg-card"
          data-media-type="image"
          data-media-src="../Works/Interactive/title%20card.png"
          data-secondary-src="../Works/Interactive/poster%20guy-01-01.png"
          data-secondary-link="https://indd.adobe.com/view/42a45967-e256-4f96-8bb0-cf16860c0c0c"
          data-media-src-ko="../Works/Interactive/title%20card%20korean.png"
          data-secondary-src-ko="../Works/Interactive/poster%20guy%20lets%20go-01.png"
          data-secondary-link-ko="https://indd.adobe.com/view/3e06e8be-d5c9-4683-a450-93634461a2fd"
          data-body-ko="강렬한 메시지, 정보 위계, 시각적 임팩트에 초점을 맞춘 캠페인형 InDesign 스프레드입니다. 이 작업은 동일한 디자인 언어 안에서 타이틀 처리와 다국어(한/영) 변형을 탐구합니다."
          data-secondary-badge="Korean!"
          data-secondary-badge-alt="English"
          data-popup-cta="Click The Lower Image To View!"
          data-popup-cta-ko="아래 이미지를 클릭해 보세요!"
          data-popup-variant="interactive-diagonal"
          data-title="Indesign: Get Out There Champ!"
          data-body="This project was a fun artistic way for me to share my experiences and tips for how college students can enter a new social life! From playing sports to talking to classmates, this interactive story contains simple games and interface designs all created in Adobe Indesign. The theme of being in the school journal was a purposeful move as it gave a fun and almost nostalgic feel to the piece. The best part is that it is bilingual! Try out both languages!"
        >
          <span class="motion-mg-card__title">Indesign: Get Out There Champ!</span>
          <span class="motion-mg-card__lead">An Indesign project meant to teach how to expand your social life in college! (and in korean!)</span>
        </button>
        <button
          type="button"
          class="motion-mg-card"
          data-media-type="image"
          data-media-src="../Works/Interactive/Screenshot%202026-04-15%20232528.png"
          data-secondary-src="../Works/Interactive/Screenshot%202026-04-15%20232810.png"
          data-secondary-link="https://sjsu-cadre-classes.github.io/SJSU_Art_101_S26_01/Assignments/Project_1/ColeLouie_PR1/index.html"
          data-popup-cta="Click The Lower Image To View!"
          data-popup-variant="interactive-diagonal"
          data-title="Interactive Story - Webpage"
          data-body="This project was supposed to be a showcasing of how I was able to use various forms of interactivity for storytelling. This webpage explores the “what if” scenarios of who I would be if I didn’t choose to be a Graphic Designer mentioning jobs such as a comic writer, marine biologist, and even a helldiver! This was made possible using the program cursor with the coding! While exploring each of these stories, there are a total of 3 ways to go through the stories varying in size and interactivity!"
        >
          <span class="motion-mg-card__title">Interactive Story - Webpage</span>
          <span class="motion-mg-card__lead">An interactive story that is based on the infamous "What if...".</span>
        </button>
        <button
          type="button"
          class="motion-mg-card"
          data-media-type="image"
          data-media-src="../Works/Interactive/Screenshot%202026-04-15%20232219.png"
          data-secondary-src="../Works/Interactive/Screenshot%202026-04-15%20232256.png"
          data-secondary-link="https://sjsu-cadre-classes.github.io/SJSU_Art_101_S26_01/Assignments/Project_2/AudreyColeCassidy/index.html"
          data-popup-cta="Click The Lower Image To View!"
          data-popup-variant="interactive-diagonal"
          data-title="Group Interface Designs"
          data-body="To sum up this project’s lore, the user is entering a world where space travel has finally been achieved and you are a pilot entering the computer’s interface to access the ship’s intelligence. This collaborative work was to reach the goal of creating a fiction computer interface! The work was split between Cassidy Singman, Audrey Wai, and I to develop this interface and to build out the lore for this universe. The webface has a series of functioning properties with a fake diagnostic scan, a working communication/chat, and an animated bioscan interface. There are also some small puzzles that we included inside to boost interactivity and engagement but also to immerse the user in this small sci fi universe. "
        >
          <span class="motion-mg-card__title">Group Interface Designs</span>
          <span class="motion-mg-card__lead">Working with Digital Media Artists, we design a scifi interface with lore!</span>
        </button>
      </div>
    </div>
  </main>
