<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector Portraits — Cole Louie</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body class="page-vector-portraits page-ai-artworks">
  <div class="vector-scroll-bg" aria-hidden="true">
    <div class="vector-scroll-bg__track vector-scroll-bg__track--forward">
      <div class="vector-scroll-bg__set">
        <img src="../Works/Vectors/TZUYU%201-01.png" alt="" />
        <img src="../Works/Vectors/Vector%20Portrait.png" alt="" />
        <img src="../Works/Vectors/Taka%202-01.png" alt="" />
        <img src="../Works/Vectors/Rose%20Framing-01-01.png" alt="" />
        <img src="../Works/Vectors/Jung%20Hoo%20poster-01.png" alt="" />
        <img src="../Works/Vectors/Hyeseoung%20Kim-01-01.png" alt="" />
      </div>
      <div class="vector-scroll-bg__set">
        <img src="../Works/Vectors/TZUYU%201-01.png" alt="" />
        <img src="../Works/Vectors/Vector%20Portrait.png" alt="" />
        <img src="../Works/Vectors/Taka%202-01.png" alt="" />
        <img src="../Works/Vectors/Rose%20Framing-01-01.png" alt="" />
        <img src="../Works/Vectors/Jung%20Hoo%20poster-01.png" alt="" />
        <img src="../Works/Vectors/Hyeseoung%20Kim-01-01.png" alt="" />
      </div>
    </div>
    <div class="vector-scroll-bg__track vector-scroll-bg__track--reverse">
      <div class="vector-scroll-bg__set">
        <img src="../Works/Vectors/Hyeseoung%20Kim-01-01.png" alt="" />
        <img src="../Works/Vectors/Jung%20Hoo%20poster-01.png" alt="" />
        <img src="../Works/Vectors/Rose%20Framing-01-01.png" alt="" />
        <img src="../Works/Vectors/Taka%202-01.png" alt="" />
        <img src="../Works/Vectors/Vector%20Portrait.png" alt="" />
        <img src="../Works/Vectors/TZUYU%201-01.png" alt="" />
      </div>
      <div class="vector-scroll-bg__set">
        <img src="../Works/Vectors/Hyeseoung%20Kim-01-01.png" alt="" />
        <img src="../Works/Vectors/Jung%20Hoo%20poster-01.png" alt="" />
        <img src="../Works/Vectors/Rose%20Framing-01-01.png" alt="" />
        <img src="../Works/Vectors/Taka%202-01.png" alt="" />
        <img src="../Works/Vectors/Vector%20Portrait.png" alt="" />
        <img src="../Works/Vectors/TZUYU%201-01.png" alt="" />
      </div>
    </div>
  </div>
  <header class="site-header">
    <nav class="top-nav top-nav--return-only" aria-label="Primary">
      <button type="button" class="motion-mg-return motion-mg-return--header" data-href="../index.html">Return</button>
      <img class="site-title" src="../png.png" alt="Cole Louie" />
      <span class="top-nav__spacer" aria-hidden="true"></span>
    </nav>
    <div class="header-divider" aria-hidden="true"></div>
  </header>

  <main class="portfolio-layout project-detail ai-gallery-page" data-ai-gallery>
    <div class="ai-gallery">
      <button type="button" class="ai-gallery__nav ai-gallery__nav--prev" data-ai-dir="-1" aria-label="Previous portrait">‹</button>
      <div class="ai-gallery__image-wrap">
        <img id="ai-gallery-image" class="ai-gallery__image" src="" alt="" />
      </div>
      <aside class="ai-gallery__text-wrap">
        <h2 id="ai-gallery-title" class="ai-gallery__title"></h2>
        <p id="ai-gallery-text" class="ai-gallery__text"></p>
      </aside>
      <button type="button" class="ai-gallery__nav ai-gallery__nav--next" data-ai-dir="1" aria-label="Next portrait">›</button>
    </div>

    <div class="ai-gallery__slides" hidden>
      <article
        data-ai-slide
        data-src="../Works/Vectors/TZUYU%201-01.png"
        data-title="TZUYU Portrait Study"
        data-text="This portrait is the first vector I have made with a woman as a subject as I wanted to experiment and learn how to vectorize hair especially with the amount of detail and contrast that this image has. Making this portrait about Tzuyu was also a fair way of learning how to simplify skin and clothing."
      ></article>
      <article
        data-ai-slide
        data-src="../Works/Vectors/Vector%20Portrait.png"
        data-title="Personal Portrait Vector"
        data-text="This is one of the latest and most detailed portraits that I have created! For this portrait, I wanted to focus on the details around the nose, mouth, and eyes which was no easy feat as the photo I chose was in direct sunlight creating sharp contrasts and leaking lights on my hair."
      ></article>
      <article
        data-ai-slide
        data-src="../Works/Vectors/Taka%202-01.png"
        data-title="Taka Portrait"
        data-text="This portrait was created as a present but I ended up learning more how to vector design around specific clothing and textures."
      ></article>
      <article
        data-ai-slide
        data-src="../Works/Vectors/Rose%20Framing-01-01.png"
        data-title="Rose Framing Composition"
        data-text="This portrait was another experiment with vector designs specifically with hair again but with the added challenge that it was poking outside of the body with the question of how to keep the portrait simple."
      ></article>
      <article
        data-ai-slide
        data-src="../Works/Vectors/Jung%20Hoo%20poster-01.png"
        data-title="Jung Hoo Poster"
        data-text="This is the first vector portrait that I have made with the essence of poster design hence the korean backdrop and Jung Hoo Lee bleeding over the borders of the image."
      ></article>
      <article
        data-ai-slide
        data-src="../Works/Vectors/Hyeseoung%20Kim-01-01.png"
        data-title="Hyeseoung Kim Portrait"
        data-text="This portrait was a simple study on image simplification."
      ></article>
    </div>
  </main>
  <script src="../script.js"></script>
</body>
</html>
